services:
  postgres:
    ports:
      - "5432:5432"

  # pgAdmin for visual DB management during development
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: chassis-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@chassis.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
